<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SRL Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    #OpenChatApp {
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="OpenChatApp"></div>
  <script src="https://requirejs.org/docs/release/2.3.6/minified/require.js"></script>
  <script>
    window.SRL_CLIENT = "lti";
    window.SRL_USERID = "__LTI_USERID__";

    require.config({
      baseUrl: "/static/lti",
      waitSeconds: 30,
      paths: {
        core: "/static/lti/core"
      }
    });
    require(["app-lazy"], function(m) {
      console.log("SRL Agent LTI UI loaded, user:", window.SRL_USERID);
      m.initOpenChat({
        page_instance_id: 1,
        system_name: "SRL Agent",
        course_id: 1,
        is_admin: false,
        course_module_id: 1,
        context_id: 1,
        user_id: window.SRL_USERID,
      });
    });
  </script>
</body>
</html>
