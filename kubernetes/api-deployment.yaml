apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\kompose\kompose-windows-amd64.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: api
  name: api
  namespace: study-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: api
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\kompose\kompose-windows-amd64.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: api
    spec:
      containers:
      - image: studybotpy-api:v1.0
        env:
          - name: PYTHONUNBUFFERED
            value: "1"
        name: api
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 5000
            protocol: TCP
      restartPolicy: Always
