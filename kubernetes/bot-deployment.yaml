apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\kompose\kompose-windows-amd64.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: bot
  name: bot
  namespace: study-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: bot
  template:
    metadata:
      annotations:
        kompose.cmd: C:\kompose\kompose-windows-amd64.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: bot
    spec:
      containers:
        - image: studybotregistry.azurecr.io/studybotpy-bot:v1.0
          env:
            - name: API_URL
              value: http://api.study-bot.svc.cluster.local:5000
          name: bot
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
