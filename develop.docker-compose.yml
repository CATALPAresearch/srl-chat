services:
  api-dev:
    build: ./api
    environment:
      - PYTHONUNBUFFERED=1
      - BASE_URL=${BASE_URL}
      - API_KEY=${API_KEY}
      - MODEL=${MODEL}
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DB=${PG_DB}
    ports:
      - 5000:5000
    command: >
      sh -c "python -m setup.db_setup &&
             gunicorn app:app -b 0.0.0.0:5000 --timeout 300 --reload"
    networks:
      - bot-net
    depends_on:
      postgres-dev:
        condition: service_healthy
    volumes:
      - ./api:/api
  bot-dev:
    build: ./discord
    environment:
      - API_URL=http://api:5000
      - DISCORD_SERVER_ID=${DISCORD_SERVER_ID}
      - BOT_TOKEN=${BOT_TOKEN}
    networks:
      - bot-net
  postgres-dev:
    image: postgres
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: srl_chat
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d srl_chat -U chat"]
      interval: 1s
      timeout: 20s
      retries: 10
    networks:
      - bot-net
networks:
  bot-net: