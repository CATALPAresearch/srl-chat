<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>SRL Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
        }

        #app {
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <!-- RequireJS loads the AMD bundle produced by webpack -->
    <script src="https://requirejs.org/docs/release/2.3.6/minified/require.js"></script>
    <script>
        require.config({
            baseUrl: "/static/lti",
            waitSeconds: 30,
            paths: {
                core: "/frontend/core"
            }
        });

        require(["app-lazy"], function () {
            console.log("SRL Chat standalone loaded");
        });
    </script>
</body>

</html>
