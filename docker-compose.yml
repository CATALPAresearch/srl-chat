services:
  api:
    build: ./backend
    environment:
      - PYTHONUNBUFFERED=1
      - BASE_URL=${BASE_URL}
      - API_KEY=${API_KEY}
      - MODEL=${MODEL}
      - EMBEDDING_URL=${EMBEDDING_URL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_TOKEN=${EMBEDDING_TOKEN}
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DB=${PG_DB}
      - INTERVIEW_PROTOCOL=${INTERVIEW_PROTOCOL:-interview_default}
      - DISABLE_LLM=${DISABLE_LLM:-false}
      - USE_RAG_STRATEGY=${USE_RAG_STRATEGY:-false}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-nomic-embed-text}
      - SECRET_KEY=${SECRET_KEY}
    expose:
      - 5000
    ports:
      - 5000:5000
    volumes:
      - ./backend/logs:/api/logs
    command: >
      sh -c "python -m db_setup &&
             gunicorn app:app -b 0.0.0.0:5000 --timeout 300"
    networks:
      - bot-net
    depends_on:
      - postgresql
  #bot:
  #  build: ./discord
  #  environment:
  #    - PYTHONUNBUFFERED=1
  #    - API_URL=http://api:5000
  #    - DISCORD_SERVER_ID=${DISCORD_SERVER_ID}
  #    - BOT_TOKEN=${BOT_TOKEN}
  #  networks:
  #    - bot-net
  postgresql:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d srl_chat -U chat"]
      interval: 1s
      timeout: 20s
      retries: 10
    networks:
      - bot-net
networks:
  bot-net:
